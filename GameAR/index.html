<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | POCARVR</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
 <!-- MindAR -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
<style>
canvas {
    background: transparent !important;
}
body {
    background: transparent;
    margin: 0;
}
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: 100%;
  height: 100%;
}

#unity-container {
  position: absolute;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

/* Unity canvas = master */
#unity-canvas {
  position: absolute !important;
  top: 0;
  left: 0;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 10;
  background: transparent !important;
  pointer-events: auto;
}

/* MindAR canvas */
.a-canvas {
  position: absolute !important;
  top: 0;
  left: 0;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 5;
}

/* camera video */
video {
  position: absolute !important;
  top: 0;
  left: 0;
  object-fit: cover;
  z-index: 1;
}

/* MindAR overlays */
.mindar-ui-overlay,
.mindar-ui-scanning,
.mindar-ui-loading,
.mindar-ui-compatibility {
  position: absolute !important;
  top: 0;
  left: 0;
  width: 100vw !important;
  height: 100vh !important;
  z-index: 20;
}
.a-canvas,
.mindar-ui-overlay,
.mindar-ui-scanning,
.mindar-ui-loading,
.mindar-ui-compatibility,
video {
    pointer-events: none !important;
}
</style>

   </head>
  <body>

   <!-- MindAR Scene -->
    <a-scene
    mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.mind;"
    color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">
    <a-assets>
      <img id="card"
        src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/card.png" />
      <a-asset-item id="avatarModel"
        src="https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.5/examples/image-tracking/assets/card-example/softmind/scene.gltf"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity id="image-target" mindar-image-target="targetIndex: 0">
      <a-plane  id="tracked-plane" visible="false" src="#card" position="0 0 0" height="0.552" width="1" rotation="0 0 0"></a-plane>
      <a-gltf-model  id="tracked-model" visible="false" rotation="0 0 0 " position="0 0 0.1" scale="0.005 0.005 0.005" src="#avatarModel"
        animation="property: position; to: 0 0.1 0.1; dur: 1000; easing: easeInOutQuad; loop: true; dir: alternate">
    </a-entity>
  </a-scene> 


    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">POCARVR</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Game.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Game.data",
        frameworkUrl: buildUrl + "/Game.framework.js",
        codeUrl: buildUrl + "/Game.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "POCARVR",
        productVersion: "0.1",
        showBanner: unityShowBanner,
        backgroundColor: "transparent",
        // errorHandler: function(err, url, line) {
        //    alert("error " + err + " occurred at line " + line);
        //    // Return 'true' if you handled this error and don't want Unity
        //    // to process it further, 'false' otherwise.
        //    return true;
        // },
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      // If you would like all file writes inside Unity Application.persistentDataPath
      // directory to automatically persist so that the contents are remembered when
      // the user revisits the site the next time, uncomment the following line:
      // config.autoSyncPersistentDataPath = true;
      // This autosyncing is currently not the default behavior to avoid regressing
      // existing user projects that might rely on the earlier manual
      // JS_FileSystem_Sync() behavior, but in future Unity version, this will be
      // expected to change.

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        //var meta = document.createElement('meta');
        //meta.name = 'viewport';
        //meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        //document.getElementsByTagName('head')[0].appendChild(meta);
        //document.querySelector("#unity-container").className = "unity-mobile";
        //canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
         //config.devicePixelRatio = 1;

        //config.matchWebGLToCanvasSize = true;


      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:
     //   canvas.style.width = "960px";
      //  canvas.style.height = "600px";
      }
      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                document.querySelector("#unity-loading-bar").style.display = "none";
                document.querySelector("#unity-fullscreen-button").onclick = () => {
                  unityInstance.SetFullscreen(1);
                };

  const target = document.querySelector("#image-target");
  const trackedModel = document.querySelector("#tracked-model");

    function updateMarkerTransform() {
         if (!trackedModel || !trackedModel.object3D) {
//            requestAnimationFrame(loop);
            return;
        }

     target.object3D.updateMatrixWorld(true);
        //const pos = target.object3D.position;
        //const rot = target.object3D.rotation;
        const worldPos = new THREE.Vector3();
        trackedModel.object3D.getWorldPosition(worldPos);

         const worldQuat = new THREE.Quaternion();
        trackedModel.object3D.getWorldQuaternion(worldQuat);

        const rot = worldQuat;
       var pos = worldPos;

       // console.log("Position:", pos);
       // console.log("Rotation:", rot);

        if (unityInstance) {
            unityInstance.SendMessage(
                "ARManager",
                "SetMarkerPosition",
                `${pos.x},${pos.y},${pos.z}`
            );

            unityInstance.SendMessage(
                "ARManager",
                "SetMarkerRotation",
                `${rot.x},${rot.y},${rot.z}`
            );
        }
    }
    target.addEventListener("targetFound", () => {
      console.log("Marker Found");

      setInterval(updateMarkerTransform, 100);
      if (unityInstance) {
        unityInstance.SendMessage(
          "ARManager",
          "ShowModel"
        );
      }
    });

    target.addEventListener("targetLost", () => {
      console.log("Marker Lost");

      if (unityInstance) {
        unityInstance.SendMessage(
          "ARManager",
          "HideModel"
        );
      }
    }); 


              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);
           /* MindAR -> Unity */
      </script>
  </body>
</html>
